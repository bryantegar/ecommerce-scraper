version: '3.8'

services:
  # ── INFRASTRUKTUR ──────────────────────────────

  beanstalkd:
    image: schickling/beanstalkd
    ports:
      - "11300:11300"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "11300"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Bryanpostgres13!
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scraper -d ecommerce_scraper"]
      interval: 10s
      timeout: 5s
      retries: 5
  # ── SCHEDULER ─────────────────────────────────

  scheduler:
    build: .
    command: python scheduler.py
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      beanstalkd:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - BEANS_HOST=beanstalkd
      - BEANS_PORT=11300
      - REDIS_HOST=redis
      - SCHEDULER_CRON_HOUR=*      # Setiap jam. Ubah ke "6,18" untuk 2x sehari
      - SCHEDULER_CRON_MINUTE=0
    restart: unless-stopped

  # ── WORKERS ───────────────────────────────────

  worker-tokopedia:
    build: .
    command: python -m workers.worker_tokopedia
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      beanstalkd:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - BEANS_HOST=beanstalkd
      - REDIS_HOST=redis
    restart: unless-stopped

  worker-shopee:
    build: .
    command: python -m workers.worker_shopee
    volumes:
      - .:/app
      - ./shopee_session:/app/shopee_session  # Mount folder session
    working_dir: /app
    depends_on:
      beanstalkd:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - BEANS_HOST=beanstalkd
      - REDIS_HOST=redis
    restart: unless-stopped

  worker-lazada:
    build: .
    command: python -m workers.worker_lazada
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      beanstalkd:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - BEANS_HOST=beanstalkd
      - REDIS_HOST=redis
    restart: unless-stopped

  worker-blibli:
    build: .
    command: python -m workers.worker_blibli
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      beanstalkd:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - BEANS_HOST=beanstalkd
      - REDIS_HOST=redis
    restart: unless-stopped

  # ── FIX: Worker OLX ditambahkan ───────────────

  worker-olx:
    build: .
    command: python -m workers.worker_olx
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      beanstalkd:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - BEANS_HOST=beanstalkd
      - REDIS_HOST=redis
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
