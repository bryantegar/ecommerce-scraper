version: '3.8'

services:

  beanstalkd:
    image: schickling/beanstalkd
    ports:
      - "11300:11300"
    restart: unless-stopped

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    restart: unless-stopped

  scheduler:
    build: .
    command: python scheduler.py
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      - beanstalkd
      - redis
    environment:
      - BEANS_HOST=beanstalkd
      - REDIS_HOST=redis
    restart: unless-stopped

  worker-tokopedia:
    build: .
    command: python -m workers.worker_tokopedia
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      - beanstalkd
      - redis
    environment:
      - BEANS_HOST=beanstalkd
      - REDIS_HOST=redis
    restart: unless-stopped

  worker-shopee:
    build: .
    command: python -m workers.worker_shopee
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      - beanstalkd
      - redis
    environment:
      - BEANS_HOST=beanstalkd
      - REDIS_HOST=redis
    restart: unless-stopped

  worker-lazada:
    build: .
    command: python -m workers.worker_lazada
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      - beanstalkd
      - redis
    environment:
      - BEANS_HOST=beanstalkd
      - REDIS_HOST=redis
    restart: unless-stopped

  worker-blibli:
    build: .
    command: python -m workers.worker_blibli
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      - beanstalkd
      - redis
    environment:
      - BEANS_HOST=beanstalkd
      - REDIS_HOST=redis
    restart: unless-stopped
